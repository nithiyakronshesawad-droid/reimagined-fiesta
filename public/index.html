<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velvet Muse Admin Login</title>
    <link rel="stylesheet" href="./login.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <header class="login-head">
          <h1>เข้าสู่ระบบ</h1>
          <div class="qr-pill">เข้าใช้งานด้วย QR</div>
        </header>

        <form id="login-form" class="login-form">
          <input id="username" name="username" placeholder="อีเมล / ชื่อผู้ใช้" required />
          <input id="password" name="password" type="password" placeholder="รหัสผ่าน" required />
          <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>

        <a class="forgot" href="#">ลืมรหัสผ่าน</a>

        <div class="divider"><span>หรือ</span></div>

        <div class="social-row">
          <button class="social" type="button">Facebook</button>
          <button class="social" type="button">Google</button>
        </div>

        <p class="terms">เมื่อเข้าสู่ระบบ แปลว่ายอมรับข้อตกลงการใช้งานและนโยบายความเป็นส่วนตัว</p>
        <p class="register">ยังไม่มีบัญชี? <a href="/women-fashion.html">ดูหน้าเว็บสินค้า</a></p>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>

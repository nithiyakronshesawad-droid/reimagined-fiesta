<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container admin-container">
      <div class="topbar">
        <div>
          <h1>Admin Dashboard</h1>
          <p class="subtitle">จัดการข้อมูลลูกค้าทั้งหมด</p>
        </div>
        <button id="logout-btn" type="button">Logout</button>
      </div>

      <section class="card">
        <h2>เพิ่มลูกค้าใหม่</h2>
        <form id="create-form" class="form-grid">
          <input id="name" name="name" placeholder="ชื่อลูกค้า" required />
          <input id="email" name="email" placeholder="email@example.com" />
          <input id="phone" name="phone" placeholder="เบอร์โทร" />
          <input id="status" name="status" placeholder="active / pending / blocked" value="active" />
          <input id="notes" name="notes" placeholder="หมายเหตุ" />
          <button type="submit">เพิ่มลูกค้า</button>
        </form>
      </section>

      <section class="card">
        <div class="topbar small-gap">
          <h2>ข้อมูลลูกค้าทั้งหมด</h2>
          <button id="refresh-btn" type="button">Refresh</button>
        </div>
        <p id="msg" class="subtitle">กำลังโหลด...</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Notes</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <div class="topbar small-gap">
          <h2>รายชื่อสมาชิกที่สมัคร</h2>
          <button id="refresh-users-btn" type="button">Refresh</button>
        </div>
        <p id="users-msg" class="subtitle">กำลังโหลด...</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Full Name</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="users-rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
